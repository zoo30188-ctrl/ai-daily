<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Daily Dashboard</title>

  <!-- PWA & Mobile -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#171614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Daily">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>

  <div class="offline-banner" id="offlineBanner" role="alert" aria-live="polite">
    📡 오프라인 상태입니다. 캐시된 기사를 표시합니다.
  </div>
  <div class="offline-banner" id="newArticlesBanner" style="display:none; background:var(--hashtag-color); color:var(--bg-color); cursor:pointer;" role="alert" aria-live="polite">
    🔔 새로운 기사가 있습니다. 클릭하여 확인하세요.
  </div>

  <!-- 헤더 -->
  <header role="banner">
    <div class="header-left">
      <h1>AI Daily</h1>
      <span class="version-badge" id="versionBadge" title="패치노트 보기" role="button" tabindex="0" aria-label="패치노트 보기"></span>
      <span class="last-updated" id="lastUpdatedText" aria-live="polite">마지막 갱신: 대기 중</span>
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" title="테마 전환" aria-label="다크/라이트 테마 전환">🌙</button>
      <button class="icon-btn" id="refreshBtn" title="새로고침" aria-label="새로고침">🔄</button>
      <button class="icon-btn" id="settingsBtn" title="설정" aria-label="설정">⚙️</button>
    </div>
  </header>

  <!-- 필터 & 검색 -->
  <nav class="controls-container" aria-label="기사 필터 및 검색">
    <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="카테고리 필터">
      <button class="tab-btn active" data-filter="all" role="tab" aria-selected="true">전체</button>
      <button class="tab-btn" data-filter="blog" role="tab" aria-selected="false">블로그</button>
      <button class="tab-btn" data-filter="newsletter" role="tab" aria-selected="false">뉴스레터</button>
      <button class="tab-btn" data-filter="youtube" role="tab" aria-selected="false">YouTube</button>
      <button class="tab-btn" data-filter="bookmarks" role="tab" aria-selected="false">⭐ 즐겨찾기</button>
    </div>
    <div class="search-bar">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input type="search" id="searchInput" class="search-input" placeholder="기사 검색..." aria-label="기사 검색">
    </div>
  </nav>

  <!-- 뉴스 그리드 -->
  <main role="main" aria-label="뉴스 기사 목록">
    <div id="newsGrid" class="news-grid" role="feed" aria-busy="false">
      <div class="status-message">뉴스를 불러오는 중...</div>
    </div>
  </main>

  <!-- 스크롤 맨 위 -->
  <button class="scroll-top-btn" id="scrollTopBtn" aria-label="맨 위로 스크롤">↑</button>

  <!-- 설정 오버레이 -->
  <div class="backdrop" id="backdrop"></div>
  <div class="settings-overlay" id="settingsOverlay" role="dialog" aria-label="설정" aria-modal="true">
    <div class="settings-header">
      <h2>설정</h2>
      <button class="icon-btn" id="closeSettingsBtn" aria-label="설정 닫기">✕</button>
    </div>
    <div class="settings-content">
      <div class="settings-group">
        <h3>API & Storage</h3>
        <div class="input-wrapper">
          <label for="geminiApiKey">Gemini API Key (선택)</label>
          <div class="api-key-row">
            <input type="password" id="geminiApiKey" class="text-input" placeholder="AI Studio에서 발급받은 키 입력">
            <button type="button" id="apiKeyToggle" class="btn-api-toggle" title="키 보기" aria-label="API 키 표시 토글">👁️</button>
          </div>
          <p class="help-text" id="apiKeyStatus">⚠️ 키는 브라우저 localStorage에 저장됩니다. 공용 PC에서는 사용을 피하세요.</p>
        </div>
        <div class="input-wrapper" style="margin-top: 1rem;">
          <label for="summaryLang">요약 언어</label>
          <select id="summaryLang" class="language-select">
            <option value="ko">🇰🇷 한국어</option>
            <option value="en">🇺🇸 English</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="zh">🇨🇳 中文</option>
          </select>
          <p class="help-text">AI 요약 결과가 선택한 언어로 출력됩니다.</p>
        </div>
        <div class="input-wrapper" style="margin-top: 1rem;">
          <label for="autoRefreshInterval">자동 새로고침</label>
          <select id="autoRefreshInterval" class="language-select">
            <option value="0">사용 안 함</option>
            <option value="15">15분마다</option>
            <option value="30">30분마다</option>
            <option value="60">1시간마다</option>
          </select>
          <p class="help-text">설정한 간격마다 백그라운드에서 기사를 갱신합니다.</p>
        </div>
      </div>

      <div class="settings-group">
        <h3>RSS 소스 관리</h3>
        <div class="toggle-list" id="sourceToggles"></div>
        <div class="custom-source-form" id="addSourceForm">
          <input type="text" id="newSourceName" placeholder="소스 이름 (예: TechCrunch)">
          <input type="url" id="newSourceUrl" placeholder="RSS 피드 URL (https://...)">
          <select id="newSourceCategory">
            <option value="blog">블로그</option>
            <option value="newsletter">뉴스레터</option>
            <option value="youtube">YouTube</option>
          </select>
          <button class="btn-add-source" id="addSourceBtn">➕ 소스 추가</button>
        </div>
      </div>

      <div class="settings-group">
        <h3>데이터 관리</h3>
        <div class="settings-actions">
          <button class="btn-settings-action" id="exportBtn">📥 설정 내보내기</button>
          <button class="btn-settings-action" id="importBtn">📤 설정 가져오기</button>
        </div>
        <div class="settings-actions" style="margin-top: 0.5rem;">
          <button class="btn-settings-action btn-danger" id="resetDataBtn">🗑️ 모든 데이터 초기화</button>
        </div>
        <input type="file" id="importFileInput" accept=".json" style="display: none;">
      </div>

      <div class="settings-footer">
        <span>AI Daily v2.2.0 · Vite · GitHub Pages</span>
      </div>
    </div>
  </div>

  <!-- 체인지로그 모달 -->
  <div class="changelog-overlay" id="changelogOverlay">
    <div class="changelog-modal">
      <div class="changelog-header">
        <h2>📋 패치노트</h2>
        <button class="icon-btn" id="closeChangelogBtn" aria-label="닫기">✕</button>
      </div>
      <div class="changelog-body" id="changelogBody"></div>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Vite 진입점 -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
